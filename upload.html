<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upload SDS — Global Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
    --sf-blue-500: #0176D3;
    --sf-blue-600: #014486;
    --sf-blue-700: #032d60;
    --sf-blue-800: #001639;
    --sf-cloud-cyan: #1AB9FF;
    --status-green: #2e844a;
    --status-green-bg: #e0f3e7;
    --status-red: #ba0517;
    --status-red-bg: #fbe0e0;
    --ink-900: #16213c;
    --ink-700: #2b3a52;
    --ink-500: #5b6a85;
    --ink-300: #8b97ad;
    --line-100: #e3e8ef;
    --canvas: #f4f6fb;
    --surface: #ffffff;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
body {
    font-family: var(--font-sans);
    background: var(--canvas);
    color: var(--ink-900);
    margin: 0;
    padding: 0;
    font-size: 14px;
    line-height: 1.5;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
}

.card {
    background: white;
    border: 1px solid var(--line-100);
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 1px 3px rgba(0, 22, 57, 0.05), 0 12px 36px rgba(0, 22, 57, 0.10);
}

.header {
    margin-bottom: 32px;
}

h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink-900);
    margin: 0 0 8px 0;
}

.subtitle {
    color: var(--ink-500);
    font-size: 15px;
}

.form-group {
    margin-bottom: 24px;
}

label {
    display: block;
    font-weight: 600;
    color: var(--ink-700);
    margin-bottom: 8px;
    font-size: 13px;
}

input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line-100);
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-900);
    transition: border-color 0.2s;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--sf-blue-500);
    box-shadow: 0 0 0 3px rgba(1, 118, 211, 0.14);
}

textarea {
    resize: vertical;
    min-height: 80px;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: var(--sf-blue-500);
    color: white;
}

.btn-primary:hover:not(:disabled) {
    background: var(--sf-blue-600);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(1, 118, 211, 0.3);
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-secondary {
    background: white;
    color: var(--ink-700);
    border: 1px solid var(--line-100);
}

.btn-secondary:hover {
    background: var(--canvas);
}

.alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 14px;
}

.alert-success {
    background: var(--status-green-bg);
    color: var(--status-green);
    border: 1px solid var(--status-green);
}

.alert-error {
    background: var(--status-red-bg);
    color: var(--status-red);
    border: 1px solid var(--status-red);
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--line-100);
}

.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--sf-blue-500);
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 20px;
}

.back-link:hover {
    color: var(--sf-blue-600);
}
</style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Back to Dashboard
    </a>

    <div class="card">
        <div class="header">
            <h1>Upload SDS Document</h1>
            <p class="subtitle">Add a new Safety Data Sheet to the global library</p>
        </div>

        <div id="alertContainer"></div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="office">Office / Location *</label>
                <select id="office" name="office" required>
                    <option value="">Select office...</option>
                    <optgroup label="Americas">
                        <option value="San Francisco">San Francisco</option>
                        <option value="Atlanta">Atlanta</option>
                        <option value="Austin">Austin</option>
                        <option value="Boston">Boston</option>
                        <option value="Burlington">Burlington</option>
                        <option value="Chicago">Chicago</option>
                        <option value="Denver">Denver</option>
                        <option value="Indianapolis">Indianapolis</option>
                        <option value="Irvine">Irvine</option>
                        <option value="Mclean">McLean</option>
                        <option value="New Jersey">New Jersey</option>
                        <option value="New York">New York</option>
                        <option value="Palo Alto">Palo Alto</option>
                        <option value="Seattle/ Bellevue">Seattle / Bellevue</option>
                        <option value="Washington DC">Washington DC</option>
                        <option value="Toronto">Toronto</option>
                        <option value="Vancouver">Vancouver</option>
                    </optgroup>
                    <optgroup label="EMEA">
                        <option value="Amsterdam">Amsterdam</option>
                        <option value="Barcelona">Barcelona</option>
                        <option value="Berlin">Berlin</option>
                        <option value="Brussels">Brussels</option>
                        <option value="Casablanca">Casablanca</option>
                        <option value="Copenhagen">Copenhagen</option>
                        <option value="Dublin">Dublin</option>
                        <option value="Dusseldorf">Düsseldorf</option>
                        <option value="Espoo">Espoo</option>
                        <option value="Frankfurt">Frankfurt</option>
                        <option value="Geneva">Geneva</option>
                        <option value="Grenoble">Grenoble</option>
                        <option value="Jena">Jena</option>
                        <option value="Lisbon">Lisbon</option>
                        <option value="London Bluefin">London Bluefin</option>
                        <option value="London Tower">London Tower</option>
                        <option value="Lyon">Lyon</option>
                        <option value="Madrid">Madrid</option>
                        <option value="Manchester">Manchester</option>
                        <option value="Mannheim">Mannheim</option>
                        <option value="Milan">Milan</option>
                        <option value="Munich">Munich</option>
                        <option value="Nantes">Nantes</option>
                        <option value="Oslo">Oslo</option>
                        <option value="Paris">Paris</option>
                        <option value="Rome">Rome</option>
                        <option value="Stockholm">Stockholm</option>
                        <option value="Vienna">Vienna</option>
                        <option value="Zurich">Zurich</option>
                    </optgroup>
                    <optgroup label="APAC">
                        <option value="Auckland">Auckland</option>
                        <option value="India">India</option>
                        <option value="Melbourne">Melbourne</option>
                        <option value="Singapore">Singapore</option>
                        <option value="Sydney">Sydney</option>
                        <option value="Tokyo">Tokyo</option>
                    </optgroup>
                    <optgroup label="Middle East">
                        <option value="Dubai">Dubai</option>
                        <option value="Nazareth">Nazareth</option>
                        <option value="Tel Aviv Alon Towers">Tel Aviv - Alon Towers</option>
                        <option value="Tel Aviv Yigal Alon">Tel Aviv - Yigal Alon</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Specific Location</label>
                <input type="text" id="location" name="location" placeholder="e.g., Janitorial closet, Ohana Floor Kitchen">
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select category...</option>
                    <option value="Cleaning agent">Cleaning Agent</option>
                    <option value="Detergent">Detergent</option>
                    <option value="Sanitizer">Sanitizer</option>
                    <option value="Floor Cleaner">Floor Care</option>
                    <option value="Metal polish">Metal Polish</option>
                    <option value="Restroom Cleaner">Restroom Cleaner</option>
                    <option value="Aerosol">Aerosol</option>
                    <option value="Common Goods">Common Goods</option>
                    <option value="Delimer">Delimer</option>
                    <option value="Polishing">Polishing</option>
                    <option value="PRESOAK">Presoak</option>
                    <option value="All Purpose Cleaner">All Purpose Cleaner</option>
                    <option value="Kitchen & Hospitality">Kitchen & Hospitality</option>
                    <option value="Janitorial Services">Janitorial Services</option>
                    <option value="HVAC & Building Systems">HVAC & Building Systems</option>
                    <option value="Laboratory Chemicals">Laboratory Chemicals</option>
                    <option value="Maintenance Products">Maintenance Products</option>
                </select>
            </div>

            <div class="form-group">
                <label for="productName">Product Name *</label>
                <input type="text" id="productName" name="productName" placeholder="e.g., SMARTPOWER Dishmachine Detergent" required>
            </div>

            <div class="form-group">
                <label for="notes">Notes (Optional)</label>
                <textarea id="notes" name="notes" placeholder="Additional information about this SDS document"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="btnText">Submit SDS Document</span>
                    <span id="btnSpinner" style="display: none;" class="spinner"></span>
                </button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('uploadForm').reset()">
                    Clear Form
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Replace this with your deployed Google Apps Script Web App URL
const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

const form = document.getElementById('uploadForm');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const btnSpinner = document.getElementById('btnSpinner');
const alertContainer = document.getElementById('alertContainer');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Disable button and show spinner
    submitBtn.disabled = true;
    btnText.textContent = 'Uploading...';
    btnSpinner.style.display = 'inline-block';
    alertContainer.innerHTML = '';

    // Get form data
    const formData = {
        office: document.getElementById('office').value,
        location: document.getElementById('location').value,
        category: document.getElementById('category').value,
        productName: document.getElementById('productName').value,
        notes: document.getElementById('notes').value
    };

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });

        // With no-cors mode, we can't read the response, so assume success
        showAlert('Success! SDS document has been added to the spreadsheet.', 'success');
        form.reset();

    } catch (error) {
        showAlert('Error: ' + error.message, 'error');
    } finally {
        // Re-enable button
        submitBtn.disabled = false;
        btnText.textContent = 'Submit SDS Document';
        btnSpinner.style.display = 'none';
    }
});

function showAlert(message, type) {
    alertContainer.innerHTML = `
        <div class="alert alert-${type}">
            ${message}
        </div>
    `;

    // Auto-hide success messages after 5 seconds
    if (type === 'success') {
        setTimeout(() => {
            alertContainer.innerHTML = '';
        }, 5000);
    }
}
</script>

</body>
</html>
