<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SDS Library — Global Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
    --sf-blue-500: #0176D3;
    --sf-blue-600: #014486;
    --sf-cloud-cyan: #1AB9FF;
    --ink-900: #16213c;
    --ink-700: #2b3a52;
    --ink-500: #5b6a85;
    --ink-300: #8b97ad;
    --line-100: #e3e8ef;
    --line-50: #eef2f8;
    --canvas: #f4f6fb;
    --surface: #ffffff;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
body {
    font-family: var(--font-sans);
    background: var(--canvas);
    color: var(--ink-900);
    margin: 0;
    padding: 0;
    font-size: 14px;
    display: grid;
    grid-template-columns: 350px 1fr;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    background: white;
    border-right: 1px solid var(--line-100);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

.sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--line-100);
}

.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--sf-blue-500);
    text-decoration: none;
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 12px;
}

.back-link:hover { color: var(--sf-blue-600); }

.office-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink-900);
    margin: 0 0 4px 0;
}

.office-meta {
    font-size: 13px;
    color: var(--ink-500);
}

.search-bar {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line-100);
}

.search-box {
    position: relative;
}

.search-box input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid var(--line-100);
    border-radius: 8px;
    font-size: 14px;
}

.search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-300);
}

.filters {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line-100);
}

.filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-700);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}

select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--line-100);
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
}

.document-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

.doc-item {
    background: white;
    border: 1px solid var(--line-100);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.doc-item:hover {
    border-color: var(--sf-blue-500);
    box-shadow: 0 2px 8px rgba(0, 22, 57, 0.08);
}

.doc-item.active {
    background: linear-gradient(90deg, rgba(1, 118, 211, 0.1), rgba(26, 185, 255, 0.05));
    border-color: var(--sf-blue-500);
}

.doc-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-900);
    margin: 0 0 4px 0;
    line-height: 1.4;
}

.doc-meta {
    font-size: 11px;
    color: var(--ink-500);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.doc-badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--line-50);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
}

/* Viewer */
.viewer {
    background: var(--canvas);
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.viewer-header {
    background: white;
    border-bottom: 1px solid var(--line-100);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.viewer-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-900);
    margin: 0;
}

.viewer-actions {
    display: flex;
    gap: 8px;
}

.btn {
    padding: 8px 14px;
    border: 1px solid var(--line-100);
    border-radius: 6px;
    background: white;
    color: var(--ink-700);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.btn:hover {
    border-color: var(--sf-blue-500);
    color: var(--sf-blue-500);
}

.btn-primary {
    background: var(--sf-blue-500);
    border-color: var(--sf-blue-500);
    color: white;
}

.btn-primary:hover {
    background: var(--sf-blue-600);
    border-color: var(--sf-blue-600);
    color: white;
}

.pdf-container {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    justify-content: center;
}

.pdf-canvas-wrapper {
    background: white;
    box-shadow: 0 2px 8px rgba(0, 22, 57, 0.1);
    border-radius: 8px;
    padding: 24px;
}

#pdfCanvas {
    max-width: 100%;
    height: auto;
}

.empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--ink-500);
    padding: 48px;
    text-align: center;
}

.empty-state svg {
    margin-bottom: 16px;
    opacity: 0.5;
}

.empty-state h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink-700);
    margin: 0 0 8px 0;
}

.empty-state p {
    font-size: 14px;
    margin: 0;
}

.pagination {
    padding: 16px 24px;
    background: white;
    border-top: 1px solid var(--line-100);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
}

.page-info {
    font-size: 13px;
    color: var(--ink-700);
}

@media (max-width: 768px) {
    body {
        grid-template-columns: 1fr;
    }

    .sidebar {
        display: none;
    }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <a href="locations.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            All Locations
        </a>
        <h1 class="office-title" id="officeTitle">San Francisco</h1>
        <p class="office-meta" id="officeMeta">342 documents · 12 categories</p>
    </div>

    <div class="search-bar">
        <div class="search-box">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5zM10 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
            </svg>
            <input type="text" id="docSearch" placeholder="Search documents...">
        </div>
    </div>

    <div class="filters">
        <div class="filter-label">Filter by Category</div>
        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="Cleaning agent">Cleaning Agent</option>
            <option value="Detergent">Detergent</option>
            <option value="Sanitizer">Sanitizer</option>
            <option value="Floor Cleaner">Floor Care</option>
            <option value="Metal polish">Metal Polish</option>
            <option value="Restroom Cleaner">Restroom Cleaner</option>
            <option value="Aerosol">Aerosol</option>
            <option value="Common Goods">Common Goods</option>
            <option value="Delimer">Delimer</option>
            <option value="Polishing">Polishing</option>
            <option value="PRESOAK">Presoak</option>
            <option value="All Purpose Cleaner">All Purpose Cleaner</option>
        </select>

        <div class="filter-label">Filter by Location</div>
        <select id="locationFilter">
            <option value="">All Locations</option>
        </select>
    </div>

    <div class="document-list" id="documentList">
        <!-- Documents will be loaded here -->
    </div>
</div>

<!-- Viewer -->
<div class="viewer">
    <div class="viewer-header">
        <h2 class="viewer-title" id="viewerTitle">Select a document</h2>
        <div class="viewer-actions">
            <button class="btn" id="downloadBtn" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                Download
            </button>
            <button class="btn" id="printBtn" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
                </svg>
                Print
            </button>
        </div>
    </div>

    <div class="pdf-container" id="pdfContainer">
        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
            </svg>
            <h3>No document selected</h3>
            <p>Choose a document from the list to view it here</p>
        </div>
    </div>

    <div class="pagination" id="pagination" style="display:none;">
        <button class="btn" id="prevPage">Previous</button>
        <span class="page-info">
            Page <span id="pageNum">1</span> of <span id="pageCount">1</span>
        </span>
        <button class="btn" id="nextPage">Next</button>
    </div>
</div>

<script>
// Get office from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const office = urlParams.get('office') || 'San Francisco';

// Set office title
document.getElementById('officeTitle').textContent = office;

// Sample document data - Replace these URLs with your actual PDF locations
// Using working sample SDS PDFs for demonstration
const sampleDocuments = {
    'San Francisco': [
        { name: 'EcoLab All Purpose Cleaner', category: 'All Purpose Cleaner', location: 'Janitorial Closet', url: 'https://www.ecolab.com/nam/united-states/pages/product-safety-data-sheets' },
        { name: 'Clorox Disinfectant Spray', category: 'Sanitizer', location: 'General Office', url: 'https://www.cdc.gov/niosh/docs/81-123/pdfs/0054.pdf' },
        { name: 'Seventh Generation Floor Cleaner', category: 'Floor Cleaner', location: 'Janitorial Closet', url: 'https://www.osha.gov/sites/default/files/publications/OSHA3514.pdf' },
        { name: 'Windex Glass Cleaner', category: 'Cleaning agent', location: 'Ohana Kitchen', url: 'https://www.cdc.gov/niosh/docs/81-123/pdfs/0054.pdf' },
        { name: 'Simple Green Degreaser', category: 'Cleaning agent', location: 'Maintenance Room', url: 'https://www.osha.gov/sites/default/files/publications/OSHA3492.pdf' },
    ],
    'Amsterdam': [
        { name: 'CSU Universele Ontkalker', category: 'Delimer', location: 'Janitorial closet', url: 'https://www.ecolab.com/-/media/Widen/Ecolab/Documents/SDS/CSU-Universal-Descaler-SDS.pdf' },
        { name: 'CSU Sanitairreiniger', category: 'Restroom Cleaner', location: 'Janitorial closet', url: 'https://www.ecolab.com/-/media/Widen/Ecolab/Documents/SDS/CSU-Bathroom-Cleaner-SDS.pdf' },
        { name: 'CSU Vloerreiniger', category: 'Floor Cleaner', location: 'Janitorial closet', url: 'https://www.ecolab.com/-/media/Widen/Ecolab/Documents/SDS/CSU-Floor-Cleaner-SDS.pdf' },
    ],
    'Atlanta': [
        { name: 'SMARTPOWER Dishmachine Detergent', category: 'Detergent', location: 'Ohana Floor Kitchen', url: 'https://www.ecolab.com/-/media/Widen/Ecolab/Documents/SDS/SMARTPOWER-Detergent-SDS.pdf' },
        { name: 'KEYSTONE SANITIZER', category: 'Sanitizer', location: 'Ohana Floor Kitchen', url: 'https://www.ecolab.com/-/media/Widen/Ecolab/Documents/SDS/KEYSTONE-Sanitizer-SDS.pdf' },
        { name: 'Green Earth Natural All Purpose Cleaner', category: 'All Purpose Cleaner', location: 'Janitorial Services', url: 'https://www.chemstation.com/wp-content/uploads/Green-Earth-All-Purpose-Cleaner-SDS.pdf' },
    ]
};

let currentDocuments = sampleDocuments[office] || sampleDocuments['San Francisco'];
let filteredDocuments = [...currentDocuments];
let currentPdf = null;
let currentPage = 1;
let totalPages = 0;

// Populate location filter
const locationFilter = document.getElementById('locationFilter');
const locations = [...new Set(currentDocuments.map(doc => doc.location))];
locations.forEach(loc => {
    const option = document.createElement('option');
    option.value = loc;
    option.textContent = loc;
    locationFilter.appendChild(option);
});

// Render document list
function renderDocuments() {
    const listEl = document.getElementById('documentList');
    listEl.innerHTML = '';

    if (filteredDocuments.length === 0) {
        listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ink-500);">No documents found</div>';
        return;
    }

    filteredDocuments.forEach((doc, index) => {
        const item = document.createElement('div');
        item.className = 'doc-item';
        item.innerHTML = `
            <div class="doc-name">${doc.name}</div>
            <div class="doc-meta">
                <span class="doc-badge">${doc.category}</span>
                <span>${doc.location}</span>
            </div>
        `;
        item.addEventListener('click', () => loadPDF(doc, item));
        listEl.appendChild(item);
    });
}

// Filter documents
document.getElementById('docSearch').addEventListener('input', filterDocuments);
document.getElementById('categoryFilter').addEventListener('change', filterDocuments);
document.getElementById('locationFilter').addEventListener('change', filterDocuments);

function filterDocuments() {
    const search = document.getElementById('docSearch').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const location = document.getElementById('locationFilter').value;

    filteredDocuments = currentDocuments.filter(doc => {
        const matchesSearch = doc.name.toLowerCase().includes(search);
        const matchesCategory = !category || doc.category === category;
        const matchesLocation = !location || doc.location === location;
        return matchesSearch && matchesCategory && matchesLocation;
    });

    renderDocuments();
}

// PDF.js setup
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Store current document for download
let currentDocument = null;

// Load PDF
function loadPDF(doc, itemEl) {
    // Update active state
    document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');

    // Store current document
    currentDocument = doc;

    // Update viewer title
    document.getElementById('viewerTitle').textContent = doc.name;
    document.getElementById('downloadBtn').style.display = 'inline-flex';
    document.getElementById('printBtn').style.display = 'inline-flex';

    // Show loading state
    const container = document.getElementById('pdfContainer');
    container.innerHTML = '<div class="empty-state"><p>Loading PDF...</p></div>';

    // Create iframe to display PDF
    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.style.borderRadius = '8px';
    iframe.style.boxShadow = '0 2px 8px rgba(0, 22, 57, 0.1)';

    // Try direct embed first, then Google Docs Viewer
    let loadAttempt = 0;
    const tryLoad = () => {
        if (loadAttempt === 0) {
            // First try: Direct PDF embed (works for CORS-enabled PDFs)
            iframe.src = doc.url;
        } else {
            // Second try: Google Docs Viewer
            iframe.src = `https://docs.google.com/viewer?url=${encodeURIComponent(doc.url)}&embedded=true`;
        }
    };

    tryLoad();

    let loaded = false;
    iframe.onload = function() {
        loaded = true;
    };

    // If iframe doesn't load after 5 seconds, try fallback or show error
    setTimeout(() => {
        if (!loaded) {
            if (loadAttempt === 0) {
                loadAttempt++;
                tryLoad();
                // Give Google Docs Viewer another 5 seconds
                setTimeout(() => {
                    if (!loaded) {
                        showError();
                    }
                }, 5000);
            } else {
                showError();
            }
        }
    }, 5000);

    function showError() {
        container.innerHTML = `
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
                </svg>
                <h3>Unable to load PDF preview</h3>
                <p><strong>Document:</strong> ${doc.name}</p>
                <p><strong>Category:</strong> ${doc.category}</p>
                <p><strong>Location:</strong> ${doc.location}</p>
                <p style="margin-top:20px;padding:16px;background:rgba(1,118,211,0.1);border-radius:8px;max-width:500px;">
                    <strong>📄 Open Directly</strong><br>
                    The PDF preview may not be available. Click below to open the document directly.
                </p>
                <button class="btn btn-primary" style="margin-top:16px;" onclick="window.open('${doc.url}', '_blank')">
                    Open PDF in New Tab
                </button>
            </div>
        `;
    }

    container.innerHTML = '';
    container.style.padding = '24px';
    container.style.display = 'flex';
    container.style.justifyContent = 'center';
    container.appendChild(iframe);
}

// Download button
document.getElementById('downloadBtn').addEventListener('click', () => {
    if (currentDocument) {
        window.open(currentDocument.url, '_blank');
    }
});

// Print button
document.getElementById('printBtn').addEventListener('click', () => {
    if (currentDocument) {
        window.open(currentDocument.url, '_blank');
    }
});

// Initial render
renderDocuments();
</script>

</body>
</html>
